[[headers]]
  for = "/*"
  [headers.values]
    # Allow SharedArrayBuffer (needed if ever using Web Workers)
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"

[[headers]]
  for = "/index.html"
  [headers.values]
    # Prevent caching so updates are always fresh
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
